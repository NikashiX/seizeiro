version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/postgres/queries"
    schema: "internal/postgres/migrations"
    gen:
      go:
        package: "postgres"
        out: "internal/postgres"
        sql_package: "pgx/v5"
        rename:
          cpf: CPF
          hash_sha256: HashSHA256
          arquivos_conteudo: ArquivoConteudo
          arquivos_conteudo_chunk: ArquivoConteudoChunk
          tokens_chatbot: TokenChatbot
          usuarios_chatbot: UsuarioChatbot
          sei_usuario: SEIUsuario
          sei_senha: SEISenha
